name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      needs_deploy: ${{ steps.check.outputs.needs_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.ref_type }}" = "tag" ]; then
            echo "needs_deploy=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
            src/ index.html public/ seed/ vite.config.ts tsconfig.json package.json)
          echo "needs_deploy=$([ -n "$CHANGED" ] && echo true || echo false)" >> $GITHUB_OUTPUT

  check-version:
    needs: detect
    if: needs.detect.outputs.needs_deploy == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Fail if UX files changed without a version bump
        run: |
          UX_CHANGED=$(git diff --name-only HEAD~1 HEAD -- src/ index.html public/ seed/ vite.config.ts tsconfig.json package.json)
          if [ -z "$UX_CHANGED" ]; then
            echo "No UX changes — version bump not required."
            exit 0
          fi
          git fetch --tags --quiet
          VERSION="v$(node -p "require('./package.json').version")"
          VERSION_NO_V="${VERSION#v}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "❌ Tag $VERSION already exists — bump the version in package.json before pushing UX changes to main."
            exit 1
          fi
          if ! grep -q "^## \[${VERSION_NO_V}\]" CHANGELOG.md; then
            echo "❌ No CHANGELOG entry found for $VERSION — add one before pushing."
            exit 1
          fi
          echo "✅ $VERSION is new and has a CHANGELOG entry, proceeding."

  build:
    needs: [detect, check-version]
    if: |
      needs.detect.outputs.needs_deploy == 'true' &&
      (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  e2e:
    needs: [detect, check-version]
    if: |
      needs.detect.outputs.needs_deploy == 'true' &&
      (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: [detect, build, e2e]
    if: needs.detect.outputs.needs_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: [detect, deploy]
    if: needs.detect.outputs.needs_deploy == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create tag, GitHub release, and update CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          VERSION_NO_V="${VERSION#v}"

          git fetch --tags --quiet
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists — skipping release."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

          awk "/^## \[${VERSION_NO_V}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' > release_notes.md

          RELEASE_URL=$(gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file release_notes.md \
            --repo ${{ github.repository }})

          echo "Release: $RELEASE_URL"

          sed -i "s|## \[${VERSION_NO_V}\] — |## [${VERSION_NO_V}](${RELEASE_URL}) — |" CHANGELOG.md
          sed -i "s|/badge/version-[0-9][0-9.]*-|/badge/version-${VERSION_NO_V}-|" README.md

          git add CHANGELOG.md README.md
          git commit -m "chore: link v${VERSION_NO_V} in CHANGELOG and update README badge"
          git pull origin main --rebase
          git push origin main
