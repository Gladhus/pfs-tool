name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      lint: ${{ steps.lint.outcome }}
      typecheck: ${{ steps.typecheck.outcome }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - id: lint
        run: npm run lint
        continue-on-error: true
      - id: typecheck
        run: npm run typecheck
        continue-on-error: true
      - id: unit
        run: npm test
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-results
          path: test-results/vitest-results.json
          retention-days: 7
          if-no-files-found: ignore
      - if: steps.lint.outcome != 'success' || steps.typecheck.outcome != 'success' || steps.unit.outcome != 'success'
        run: exit 1

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - id: e2e
        run: npm run test:e2e
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: playwright-report/results.json
          retention-days: 7
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - if: steps.e2e.outcome != 'success'
        run: exit 1

  summary:
    needs: [test, e2e]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: vitest-results
          path: test-results
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: playwright-results
          path: playwright-report
        continue-on-error: true
      - id: build
        env:
          LINT_OUTCOME: ${{ needs.test.outputs.lint }}
          TYPECHECK_OUTCOME: ${{ needs.test.outputs.typecheck }}
          VITEST_JSON_PATH: test-results/vitest-results.json
          PLAYWRIGHT_JSON_PATH: playwright-report/results.json
        run: node scripts/build-ci-summary.mjs > /tmp/ci-summary.md
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/ci-summary.md', 'utf8');
            const marker = '<!-- pfs-tool-ci-summary -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
