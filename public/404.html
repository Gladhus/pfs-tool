<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Net Worth Tracker</title>
  <script>
    // spa-github-pages: redirect deep links to the SPA base URL, encoding the
    // path in the query string so the restore script in index.html can recover it.
    //
    // segmentsToKeep=1 accounts for the /pfs-tool-react/ basename on GH Pages.
    // A hard-refresh of /pfs-tool-react/overview redirects to /pfs-tool-react/?/overview.
    var s = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + s).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(s).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>Redirecting…</body>
</html>
